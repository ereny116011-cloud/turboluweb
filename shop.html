<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - TurboluMC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🛒 Shop</h1>
      <a href="index.html">← Ana Sayfa</a>
    </header>
    <div class="card">
      <p>Bakiye: <span id="balance">0</span></p>
      <div id="items">Yükleniyor...</div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    async function loadItems() {
      const items = await apiGet('/api/items');
      document.getElementById('items').innerHTML = items.map(i => `
        <div class="card" style="margin:10px 0">
          <b>${i.name}</b> - ${i.price} puan
          <button onclick="buyItem('${i.id}')">Satın Al</button>
        </div>`).join('');
      document.getElementById('balance').textContent = getUser()?.balance || 0;
    }
    async function buyItem(itemId) {
      if (!getToken()) return alert('Önce giriş yap!');
      const res = await apiPost('/api/buy', { itemId });
      if (res.error) return alert(res.error);
      alert('Satın alındı!');
      loadItems();
    }
    loadItems();
  </script>
</body>
</html>
